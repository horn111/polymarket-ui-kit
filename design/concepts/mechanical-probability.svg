<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200" role="img" aria-labelledby="title desc">
  <title id="title">Mechanical Probability concept board for Polymarket UI Kit</title>
  <desc id="desc">Premium tactile interface direction using anodized metal, ceramic labels, burnished copper, calibrated plates, a desktop hero, mobile view, market card, studio fragment, palette and six motion frames.</desc>
  <defs>
    <linearGradient id="graphite" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d0d11"/><stop offset=".5" stop-color="#17171e"/><stop offset="1" stop-color="#101014"/></linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2d2d38"/><stop offset=".18" stop-color="#191920"/><stop offset=".52" stop-color="#333340"/><stop offset=".75" stop-color="#15151b"/><stop offset="1" stop-color="#24242d"/></linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#a95532"/><stop offset=".55" stop-color="#d58a5d"/><stop offset="1" stop-color="#f0c09b"/></linearGradient>
    <linearGradient id="ceramic" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f1f0ea"/><stop offset="1" stop-color="#d9d8d2"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000" flood-opacity=".65"/></filter>
    <filter id="inner"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#fff" flood-opacity=".12"/></filter>
    <pattern id="grain" width="7" height="7" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r=".45" fill="#fff" opacity=".04"/><circle cx="5" cy="4" r=".35" fill="#000" opacity=".16"/></pattern>
    <style>
      .display{font-family:Unbounded,"Arial Black",Arial,sans-serif;fill:#ecebe6}.ui{font-family:"Segoe UI",Arial,sans-serif;fill:#ecebe6}.mono{font-family:"Chivo Mono",Consolas,monospace;fill:#a4a2ad}.panel{fill:url(#graphite);stroke:#ecebe6;stroke-opacity:.13}.metal{fill:url(#metal);stroke:#ecebe6;stroke-opacity:.14}.ceramic{fill:url(#ceramic);stroke:#fff;stroke-opacity:.42}.label{font-size:9px;letter-spacing:.13em}.body{font-size:15px;fill:#a4a2ad}.muted{fill:#8a8893}.copper{fill:#d58a5d}.live{fill:#54d4b6}.rule{stroke:#ecebe6;stroke-opacity:.14}.num{font-variant-numeric:tabular-nums}
    </style>
  </defs>
  <rect width="1920" height="1200" fill="#09090c"/>
  <rect width="1920" height="1200" fill="url(#grain)"/>
  <text x="40" y="48" class="display" font-size="22" font-weight="650">03 / MECHANICAL PROBABILITY</text>
  <text x="40" y="75" class="mono label">ENGINEERED · TACTILE · ASSURED</text>
  <g transform="translate(1644 26)">
    <rect x="0" y="2" width="32" height="38" rx="5" class="metal"/><rect x="12" y="10" width="32" height="38" rx="5" class="ceramic"/><path d="M8 21H36" stroke="#d58a5d" stroke-width="3"/>
    <circle cx="7" cy="9" r="2" fill="#797783"/><circle cx="37" cy="41" r="2" fill="#8c8995"/>
    <text x="60" y="18" class="ui" font-size="13" font-weight="700">Polymarket UI Kit</text><text x="60" y="38" class="mono" font-size="9">CIVIC FORECAST / CALIBRATED EDITION</text>
  </g>

  <!-- Desktop hero -->
  <g filter="url(#shadow)"><rect x="40" y="108" width="1100" height="540" rx="14" fill="url(#graphite)" stroke="#ecebe6" stroke-opacity=".16"/></g>
  <rect x="40" y="108" width="1100" height="540" rx="14" fill="url(#grain)"/>
  <g transform="translate(66 132)">
    <rect x="0" y="0" width="25" height="30" rx="4" class="metal"/><rect x="10" y="7" width="25" height="30" rx="4" class="ceramic"/><path d="M6 17H30" stroke="#d58a5d" stroke-width="2"/>
    <text x="50" y="22" class="ui" font-size="11" font-weight="700">POLYMARKET UI KIT</text>
    <text x="742" y="22" class="ui" font-size="10" fill="#a4a2ad">COMPONENTS</text><text x="838" y="22" class="ui" font-size="10" fill="#a4a2ad">STUDIO</text><text x="902" y="22" class="ui" font-size="10" fill="#a4a2ad">DOCS</text>
    <rect x="957" y="2" width="90" height="28" rx="5" class="ceramic"/><text x="975" y="20" class="mono" font-size="8" style="fill:#15151b">DARK / 01</text>
    <line x1="0" y1="54" x2="1048" y2="54" class="rule"/>
    <text x="0" y="98" class="mono label" style="fill:#d58a5d">CIVIC FORECAST · INSTRUMENT 01</text>
    <text x="0" y="168" class="display" font-size="44" font-weight="620">MAKE PROBABILITY</text><text x="0" y="221" class="display" font-size="44" font-weight="620">FEEL CREDIBLE.</text>
    <text x="0" y="270" class="ui body">A React system for sourced markets, public data</text><text x="0" y="293" class="ui body">and distribution-ready surfaces.</text>
    <rect x="0" y="330" width="145" height="46" rx="7" fill="url(#ceramic)"/><text x="28" y="358" class="ui" font-size="12" font-weight="750" style="fill:#111117">TRY STUDIO →</text>
    <rect x="156" y="330" width="145" height="46" rx="7" class="metal"/><text x="181" y="358" class="ui" font-size="11">EXPLORE KIT ↗</text>
    <g transform="translate(0 420)">
      <rect width="478" height="58" rx="8" class="metal"/><circle cx="18" cy="17" r="3" fill="#54d4b6"/><text x="32" y="20" class="mono" font-size="8">LIVE PUBLIC MARKET</text><text x="16" y="43" class="ui" font-size="10" fill="#a4a2ad">SOURCE-AWARE / CATEGORY-NEUTRAL / REDUCED-MOTION READY</text>
      <circle cx="462" cy="13" r="3" fill="#6c6a75"/><circle cx="462" cy="45" r="3" fill="#6c6a75"/>
    </g>
    <!-- Instrument -->
    <g transform="translate(520 82)">
      <rect width="528" height="396" rx="18" class="metal" filter="url(#inner)"/>
      <circle cx="17" cy="17" r="4" fill="#0c0c10" stroke="#73717d"/><circle cx="511" cy="17" r="4" fill="#0c0c10" stroke="#73717d"/><circle cx="17" cy="379" r="4" fill="#0c0c10" stroke="#73717d"/><circle cx="511" cy="379" r="4" fill="#0c0c10" stroke="#73717d"/>
      <rect x="22" y="24" width="484" height="49" rx="7" class="ceramic"/><text x="38" y="45" class="mono" font-size="8" style="fill:#55535c">MARKET INSTRUMENT / POLITICS / SAMPLE</text><text x="38" y="63" class="ui" font-size="12" font-weight="700" style="fill:#17171e">WHO WILL WIN THE 2028 U.S. ELECTION?</text>
      <g transform="translate(22 92)">
        <rect width="484" height="196" rx="12" fill="#0c0c11" stroke="#ecebe6" stroke-opacity=".1"/>
        <path d="M27 147C84 147 95 101 151 108S227 149 279 105 380 77 457 58" fill="none" stroke="url(#copper)" stroke-width="3"/>
        <path d="M27 47H457M27 97H457M27 147H457" class="rule"/>
        <rect x="290" y="28" width="157" height="62" rx="8" class="metal"/><text x="306" y="50" class="mono" font-size="8">CANDIDATE A</text><text x="306" y="78" class="display copper num" font-size="27">42%</text>
        <circle cx="457" cy="58" r="6" fill="#d58a5d" stroke="#f0c09b" stroke-width="2"/>
      </g>
      <g transform="translate(22 306)">
        <rect width="232" height="66" rx="9" class="ceramic"/><text x="14" y="22" class="mono" font-size="8" style="fill:#55535c">OUTCOME / A</text><text x="14" y="49" class="ui" font-size="14" font-weight="700" style="fill:#17171e">Candidate A</text><text x="184" y="50" class="display" font-size="18" style="fill:#17171e">42¢</text>
        <rect x="250" width="234" height="66" rx="9" fill="#17171e" stroke="#ecebe6" stroke-opacity=".12"/><text x="264" y="22" class="mono" font-size="8">OUTCOME / FIELD</text><text x="264" y="49" class="ui" font-size="14">Field</text><text x="434" y="50" class="display copper" font-size="18">58¢</text>
      </g>
    </g>
  </g>

  <!-- Mobile -->
  <g filter="url(#shadow)"><rect x="1170" y="108" width="250" height="540" rx="26" fill="url(#graphite)" stroke="#ecebe6" stroke-opacity=".2"/></g>
  <rect x="1170" y="108" width="250" height="540" rx="26" fill="url(#grain)"/>
  <g transform="translate(1188 130)">
    <rect width="18" height="23" rx="3" class="metal"/><rect x="7" y="6" width="18" height="23" rx="3" class="ceramic"/><path d="M4 14H22" stroke="#d58a5d" stroke-width="2"/><text x="36" y="18" class="ui" font-size="9" font-weight="700">POLYMARKET UI KIT</text>
    <text x="0" y="65" class="mono" font-size="7" style="fill:#d58a5d">CIVIC FORECAST / INSTRUMENT 01</text>
    <text x="0" y="100" class="display" font-size="20">MAKE</text><text x="0" y="127" class="display" font-size="20">PROBABILITY</text><text x="0" y="154" class="display" font-size="20">FEEL CREDIBLE.</text>
    <text x="0" y="183" class="ui" font-size="10" fill="#a4a2ad">Sourced market surfaces for builders.</text>
    <rect x="0" y="202" width="214" height="40" rx="7" fill="url(#ceramic)"/><text x="66" y="227" class="ui" font-size="10" font-weight="750" style="fill:#111117">TRY STUDIO →</text>
    <rect x="0" y="254" width="214" height="205" rx="13" class="metal"/>
    <circle cx="11" cy="265" r="3" fill="#09090c" stroke="#73717d"/><circle cx="203" cy="265" r="3" fill="#09090c" stroke="#73717d"/>
    <rect x="12" y="270" width="190" height="42" rx="6" class="ceramic"/><text x="22" y="286" class="mono" font-size="6" style="fill:#55535c">LIVE / POLITICS / SAMPLE</text><text x="22" y="302" class="ui" font-size="9" font-weight="700" style="fill:#17171e">2028 U.S. ELECTION</text>
    <path d="M18 392C54 384 76 405 111 372S163 348 196 351" fill="none" stroke="url(#copper)" stroke-width="2.2"/>
    <text x="135" y="351" class="display copper" font-size="24">42%</text>
    <rect x="12" y="414" width="190" height="31" rx="5" class="ceramic"/><text x="22" y="434" class="ui" font-size="9" style="fill:#17171e">Candidate A</text><text x="166" y="435" class="display" font-size="12" style="fill:#17171e">42¢</text>
    <text x="0" y="493" class="mono" font-size="7">SOURCE 04 · UPDATED 16:42 UTC</text>
  </g>

  <!-- Market card -->
  <g transform="translate(1450 108)">
    <rect width="430" height="250" rx="14" class="metal"/>
    <circle cx="14" cy="14" r="3" fill="#09090c" stroke="#73717d"/><circle cx="416" cy="14" r="3" fill="#09090c" stroke="#73717d"/>
    <rect x="18" y="22" width="394" height="56" rx="7" class="ceramic"/><text x="31" y="42" class="mono" font-size="7" style="fill:#55535c">MARKETCARD / DEFAULT / LIVE</text><text x="31" y="64" class="ui" font-size="14" font-weight="700" style="fill:#17171e">WILL VOTER TURNOUT EXCEED 2022?</text>
    <text x="20" y="104" class="mono" font-size="8">POLITICS · NOV 03 · $5.8M VOLUME</text>
    <rect x="18" y="120" width="394" height="47" rx="7" fill="#111117" stroke="#d58a5d" stroke-opacity=".34"/><text x="32" y="149" class="ui" font-size="12">YES</text><text x="356" y="151" class="display copper num" font-size="18">67¢</text>
    <rect x="18" y="175" width="394" height="47" rx="7" class="ceramic"/><text x="32" y="204" class="ui" font-size="12" style="fill:#17171e">NO</text><text x="359" y="206" class="display num" font-size="17" style="fill:#17171e">33¢</text>
    <path d="M20 238H410" class="rule"/><circle cx="20" cy="238" r="3" fill="#54d4b6"/><text x="32" y="242" class="mono" font-size="7">CALIBRATED 16:42 UTC</text>
  </g>

  <!-- Studio -->
  <g transform="translate(1450 390)">
    <rect width="430" height="258" rx="14" class="metal"/>
    <circle cx="14" cy="14" r="3" fill="#09090c" stroke="#73717d"/><circle cx="416" cy="14" r="3" fill="#09090c" stroke="#73717d"/>
    <rect x="18" y="22" width="394" height="30" rx="6" class="ceramic"/><text x="30" y="41" class="mono" font-size="8" style="fill:#55535c">STUDIO / CALIBRATION WORKSPACE</text>
    <rect x="18" y="66" width="394" height="34" rx="6" fill="#0c0c11" stroke="#ecebe6" stroke-opacity=".14"/><text x="30" y="88" class="mono" font-size="8">polymarket.com/event/2028-us-election</text>
    <g transform="translate(18 114)"><rect width="246" height="121" rx="9" fill="#0c0c11" stroke="#ecebe6" stroke-opacity=".1"/><text x="13" y="20" class="mono" font-size="7">LIVE PREVIEW</text><path d="M18 93C58 88 75 103 111 74S171 49 228 45" fill="none" stroke="url(#copper)" stroke-width="2"/><text x="160" y="72" class="display copper" font-size="27">42%</text><circle cx="228" cy="45" r="4" fill="#d58a5d"/></g>
    <g transform="translate(278 114)"><rect width="134" height="121" rx="9" class="ceramic"/><text x="12" y="20" class="mono" font-size="7" style="fill:#55535c">OUTPUT PLATE</text><rect x="11" y="34" width="112" height="26" rx="5" fill="#17171e"/><text x="22" y="51" class="ui" font-size="9">Embed</text><text x="12" y="79" class="ui" font-size="9" style="fill:#55535c">React</text><line x1="12" y1="88" x2="122" y2="88" stroke="#777580" stroke-opacity=".35"/><text x="12" y="108" class="ui" font-size="9" style="fill:#55535c">OG / Registry</text></g>
  </g>

  <!-- Palette -->
  <g transform="translate(40 688)">
    <text y="20" class="display" font-size="18">MATERIAL &amp; PALETTE</text>
    <g transform="translate(0 42)"><rect width="84" height="58" rx="7" fill="#101014" stroke="#ecebe6" stroke-opacity=".18"/><text y="78" class="mono" font-size="9">GRAPHITE</text><rect x="98" width="84" height="58" rx="7" fill="url(#metal)"/><text x="98" y="78" class="mono" font-size="9">ANODIZED</text><rect x="196" width="84" height="58" rx="7" fill="url(#ceramic)"/><text x="196" y="78" class="mono" font-size="9">CERAMIC</text><rect x="294" width="84" height="58" rx="7" fill="#d58a5d"/><text x="294" y="78" class="mono" font-size="9">COPPER</text><rect x="392" width="84" height="58" rx="7" fill="#54d4b6"/><text x="392" y="78" class="mono" font-size="9">LIVE</text></g>
    <g transform="translate(570)"><text y="20" class="display" font-size="18">TYPE</text><text y="64" class="display" font-size="28">UNBOUNDED</text><text y="96" class="mono" font-size="12">CHIVO MONO · 42.8% · CAL 16:42</text></g>
    <g transform="translate(1110)"><text y="20" class="display" font-size="18">RULES</text><text y="54" class="ui" font-size="12" fill="#a4a2ad">01  Every layer has a mechanical role</text><text y="78" class="ui" font-size="12" fill="#a4a2ad">02  Ceramic labels carry primary actions</text><text y="102" class="ui" font-size="12" fill="#a4a2ad">03  Dense UI falls back to flat graphite</text></g>
  </g>

  <!-- Storyboard -->
  <text x="40" y="858" class="display" font-size="18">WEB-MOTION STORYBOARD / 0–1800 MS</text>
  <g transform="translate(40 880)">
    <g><rect width="292" height="250" rx="14" class="metal"/><text x="14" y="23" class="mono" font-size="8">00 / 0 MS · REST</text><rect x="95" y="80" width="102" height="78" rx="8" fill="#111117" stroke="#ecebe6" stroke-opacity=".1"/><circle cx="109" cy="94" r="3" fill="#6f6d78"/><circle cx="183" cy="144" r="3" fill="#6f6d78"/><text x="14" y="226" class="ui" font-size="12" fill="#a4a2ad">The instrument waits in low light.</text></g>
    <g transform="translate(306)"><rect width="292" height="250" rx="14" class="metal"/><text x="14" y="23" class="mono" font-size="8">01 / 160 MS · PLATE TRAVEL</text><rect x="61" y="83" width="104" height="72" rx="7" fill="#202028"/><rect x="126" y="96" width="104" height="72" rx="7" class="ceramic"/><path d="M78 119H213" stroke="#d58a5d" stroke-width="3"/><text x="14" y="226" class="ui" font-size="12" fill="#a4a2ad">Two plates separate with weighted drag.</text></g>
    <g transform="translate(612)"><rect width="292" height="250" rx="14" class="metal"/><text x="14" y="23" class="mono" font-size="8">02 / 410 MS · MARK ALIGN</text><rect x="104" y="78" width="62" height="78" rx="7" fill="#202028"/><rect x="126" y="92" width="62" height="78" rx="7" class="ceramic"/><path d="M112 121H180" stroke="#d58a5d" stroke-width="3"/><text x="14" y="226" class="ui" font-size="12" fill="#a4a2ad">The master mark locks to calibration.</text></g>
    <g transform="translate(918)"><rect width="292" height="250" rx="14" class="metal"/><text x="14" y="23" class="mono" font-size="8">03 / 760 MS · VALUE ENGAGE</text><rect x="55" y="76" width="182" height="84" rx="9" fill="#0c0c11"/><text x="86" y="107" class="mono" font-size="8">MARKET PROBABILITY</text><text x="103" y="145" class="display copper" font-size="31">42%</text><text x="14" y="226" class="ui" font-size="12" fill="#a4a2ad">The value arrives like a physical readout.</text></g>
    <g transform="translate(1224)"><rect width="292" height="250" rx="14" class="metal"/><text x="14" y="23" class="mono" font-size="8">04 / 1180 MS · OUTCOMES</text><rect x="36" y="75" width="220" height="40" rx="6" class="ceramic"/><rect x="36" y="124" width="220" height="40" rx="6" fill="#111117" stroke="#d58a5d" stroke-opacity=".3"/><text x="49" y="100" class="ui" font-size="10" style="fill:#17171e">Candidate A</text><text x="212" y="101" class="display" font-size="11" style="fill:#17171e">42¢</text><text x="49" y="149" class="ui" font-size="10">Field</text><text x="214" y="150" class="display copper" font-size="11">58¢</text><text x="14" y="226" class="ui" font-size="12" fill="#a4a2ad">Outcome plates settle around the value.</text></g>
    <g transform="translate(1530)"><rect width="292" height="250" rx="14" class="metal"/><text x="14" y="23" class="mono" font-size="8">05 / 1800 MS · CALIBRATED</text><rect x="47" y="80" width="198" height="48" rx="7" fill="url(#ceramic)"/><text x="102" y="109" class="ui" font-size="10" font-weight="750" style="fill:#111117">TRY STUDIO →</text><circle cx="61" cy="154" r="3" fill="#54d4b6"/><text x="74" y="158" class="mono" font-size="8">LIVE / READY / STABLE</text><text x="14" y="226" class="ui" font-size="12" fill="#a4a2ad">The machine rests; interaction is immediate.</text></g>
  </g>
</svg>
