    <g transform="translate(306)"><rect width="292" height="250" rx="8" class="panel"/><text x="14" y="23" class="mono" font-size="8">01 / 120 MS · SIGNAL CUT</text><rect x="32" y="78" width="228" height="18" fill="#d7ff4f"/><rect x="32" y="106" width="160" height="18" fill="#f3f2ea"/><rect x="32" y="134" width="96" height="18" fill="#51d5b1"/><text x="14" y="226" class="ui" font-size="12" fill="#8b938b">Three hard wipes establish cadence.</text></g>
    <g transform="translate(612)"><rect width="292" height="250" rx="8" class="panel"/><text x="14" y="23" class="mono" font-size="8">02 / 360 MS · HEADLINE LOCK</text><text x="42" y="112" class="display" font-size="32" font-weight="760">MAKE PROBABILITY</text><text x="42" y="143" class="display" font-size="32" font-weight="760">FEEL CREDIBLE.</text><rect x="32" y="83" width="5" height="71" fill="#d7ff4f"/><text x="14" y="226" class="ui" font-size="12" fill="#8b938b">Type lands against the live rail.</text></g>
