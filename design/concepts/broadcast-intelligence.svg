<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200" role="img" aria-labelledby="title desc">
  <title id="title">Broadcast Intelligence concept board for Polymarket UI Kit</title>
  <desc id="desc">Premium broadcast-inspired interface direction with directional typography, carbon panels, chartreuse signals, a desktop hero, mobile view, market card, studio fragment, palette and six motion frames.</desc>
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080a09"/><stop offset=".62" stop-color="#111512"/><stop offset="1" stop-color="#171e19"/></linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#d7ff4f"/><stop offset=".6" stop-color="#85ec75"/><stop offset="1" stop-color="#51d5b1"/></linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d7ff4f" stop-opacity=".92"/><stop offset=".45" stop-color="#5fe0b3" stop-opacity=".46"/><stop offset="1" stop-color="#111512" stop-opacity="0"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".58"/></filter>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse"><path d="M0 8H8" stroke="#f3f2ea" stroke-opacity=".035"/></pattern>
    <style>
      .display{font-family:"Barlow Condensed","Arial Narrow",Arial,sans-serif;fill:#f3f2ea}.ui{font-family:"Public Sans","Segoe UI",Arial,sans-serif;fill:#f3f2ea}.mono{font-family:Consolas,monospace;fill:#a7afa6}.panel{fill:#111512;stroke:#f3f2ea;stroke-opacity:.15}.panel2{fill:#171d18;stroke:#f3f2ea;stroke-opacity:.12}.label{font-size:10px;letter-spacing:.14em}.body{font-size:15px;fill:#a7afa6}.muted{fill:#8b938b}.acid{fill:#d7ff4f}.live{fill:#51d5b1}.warm{fill:#f3f2ea}.rule{stroke:#f3f2ea;stroke-opacity:.16}.num{font-variant-numeric:tabular-nums}
    </style>
  </defs>
  <rect width="1920" height="1200" fill="#070907"/>
  <rect width="1920" height="1200" fill="url(#scan)" opacity=".8"/>
  <text x="40" y="48" class="display" font-size="29" font-weight="700" letter-spacing=".04em">02 / BROADCAST INTELLIGENCE</text>
  <text x="40" y="75" class="mono label">IMMEDIATE · INFORMED · DIRECTIONAL</text>
  <g transform="translate(1644 28)">
