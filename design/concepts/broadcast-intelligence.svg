  <g filter="url(#shadow)"><rect x="40" y="108" width="1100" height="540" rx="8" fill="url(#stage)" stroke="#f3f2ea" stroke-opacity=".16"/></g>
  <g transform="translate(62 126)">
    <path d="M0 0H14V9H6V27H14V36H0Z" fill="#d7ff4f"/><path d="M36 0H22V9H30V27H22V36H36Z" fill="#f3f2ea"/>
    <text x="52" y="23" class="ui" font-size="12" font-weight="700">POLYMARKET UI KIT</text>
    <text x="740" y="23" class="ui" font-size="11" fill="#a7afa6">COMPONENTS</text><text x="842" y="23" class="ui" font-size="11" fill="#a7afa6">STUDIO</text><text x="908" y="23" class="ui" font-size="11" fill="#a7afa6">DOCS</text>
    <rect x="962" y="7" width="92" height="24" fill="#d7ff4f"/><text x="980" y="23" class="ui" font-size="9" font-weight="800" style="fill:#090b09">LIVE / DARK</text>
    <line x1="0" y1="52" x2="1056" y2="52" class="rule"/>
    <rect x="0" y="75" width="8" height="298" fill="#d7ff4f"/>
    <text x="27" y="95" class="mono label" style="fill:#d7ff4f">CIVIC FORECAST · POLITICS EDITION</text>
    <text x="27" y="184" class="display" font-size="80" font-weight="760" letter-spacing="-1.5">MAKE PROBABILITY</text>
    <text x="27" y="257" class="display" font-size="80" font-weight="760" letter-spacing="-1.5">FEEL CREDIBLE.</text>
    <text x="30" y="299" class="ui body">A React system for sourced markets, public data</text><text x="30" y="322" class="ui body">and distribution-ready surfaces.</text>
