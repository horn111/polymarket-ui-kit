    <g transform="translate(1224)"><rect width="292" height="250" rx="8" class="panel"/><text x="14" y="23" class="mono" font-size="8">04 / 1080 MS · DATA LOCK</text><rect x="31" y="72" width="230" height="24" fill="#f3f2ea"/><text x="39" y="88" class="mono" font-size="7" style="fill:#090b09">LIVE MARKET / SOURCE 04</text><text x="32" y="130" class="display" font-size="25">CANDIDATE A</text><text x="206" y="130" class="display acid" font-size="25">42%</text><text x="14" y="226" class="ui" font-size="12" fill="#8b938b">Evidence and price lock on one beat.</text></g>
    <g transform="translate(1530)"><rect width="292" height="250" rx="8" class="panel"/><text x="14" y="23" class="mono" font-size="8">05 / 1800 MS · ON AIR</text><rect x="32" y="79" width="228" height="36" fill="#d7ff4f"/><text x="105" y="102" class="ui" font-size="10" font-weight="800" style="fill:#090b09">TRY STUDIO →</text><path d="M32 144H260" stroke="#f3f2ea" stroke-opacity=".3"/><text x="32" y="165" class="mono" font-size="8">LIVE / STABLE / INTERACTIVE</text><text x="14" y="226" class="ui" font-size="12" fill="#8b938b">Energy settles into a readable system.</text></g>
