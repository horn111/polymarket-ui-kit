    <g transform="translate(570)"><text y="20" class="display" font-size="24" font-weight="700">TYPE</text><text y="66" class="display" font-size="39" font-weight="760">BARLOW CONDENSED</text><text y="96" class="ui" font-size="12">Public Sans · 42.8% · LIVE 16:42 UTC</text></g>
    <g transform="translate(1110)"><text y="20" class="display" font-size="24" font-weight="700">RULES</text><text y="54" class="ui" font-size="12" fill="#a7afa6">01  Direction before decoration</text><text y="78" class="ui" font-size="12" fill="#a7afa6">02  One active signal per surface</text><text y="102" class="ui" font-size="12" fill="#a7afa6">03  Density is earned by live information</text></g>
