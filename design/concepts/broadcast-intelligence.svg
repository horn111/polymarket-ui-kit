      <rect x="15" y="96" width="454" height="4" fill="#2a302a"/><rect x="15" y="96" width="191" height="4" fill="#d7ff4f"/>
    </g>
    <g transform="translate(0 478)"><rect width="1056" height="35" fill="#f3f2ea"/><text x="14" y="23" class="mono" font-size="9" style="fill:#090b09">NEUTRAL BY DESIGN</text><text x="275" y="23" class="mono" font-size="9" style="fill:#090b09">SOURCE-AWARE</text><text x="520" y="23" class="mono" font-size="9" style="fill:#090b09">21 REACT COMPONENTS</text><text x="820" y="23" class="mono" font-size="9" style="fill:#090b09">PNG + SVG EXPORT</text></g>
