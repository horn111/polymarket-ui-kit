name: Storybook

on:
  pull_request:
  push:
    branches: [main]

jobs:
  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook dependencies
        run: pnpm --filter "@polymarket-ui-kit/react..." build
      - name: Build Storybook
        env:
          HOME: ${{ github.workspace }}/.cache/storybook-home
          USERPROFILE: ${{ github.workspace }}/.cache/storybook-home
          STORYBOOK_DISABLE_TELEMETRY: "1"
        run: pnpm --filter @polymarket-ui-kit/storybook build:ci
