<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" fill="none">
  <style>
    .label-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 11px; }
    .label-sans { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .title-sans { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 800; letter-spacing: -0.02em; }
    .code-text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; line-height: 20px; }
  </style>

  <!-- Background: Deep Carbon / Zinc-950 -->
  <rect width="1200" height="640" fill="#09090b" />

  <!-- Layout Outer Frame -->
  <rect x="30" y="30" width="1140" height="580" rx="6" stroke="#27272a" stroke-width="1" />

  <!-- Layout Dividers (Spec Grid) -->
  <!-- Header divider -->
  <line x1="30" y1="100" x2="1170" y2="100" stroke="#27272a" stroke-width="1" />
  <!-- Main vertical divider -->
  <line x1="540" y1="100" x2="540" y2="610" stroke="#27272a" stroke-width="1" />
  <!-- Left horizontal divider -->
  <line x1="30" y1="420" x2="540" y2="420" stroke="#27272a" stroke-width="1" />
  <!-- Right horizontal divider -->
  <line x1="540" y1="310" x2="1170" y2="310" stroke="#27272a" stroke-width="1" />

  <!-- SECTION 00: HEADER / TITLE -->
  <g class="label-sans">
    <text x="60" y="70" fill="#fafafa" font-size="24" class="title-sans" font-weight="900">POLYMARKET UI KIT / DESIGN SYSTEM</text>
    <text x="540" y="68" fill="#a1a1aa" font-size="14" font-weight="400">Design token specification and interactive component states</text>
    <text x="1140" y="68" fill="#71717a" font-size="11" class="label-mono" text-anchor="end" font-weight="600">v1.0.0 / SYSTEM_SPEC</text>
  </g>

  <!-- SECTION 01: DESIGN TOKENS (Top Left) -->
  <g transform="translate(60, 120)" class="label-sans">
    <text x="0" y="15" fill="#71717a" font-size="11" class="label-mono" font-weight="700" letter-spacing="0.05em">01. DESIGN TOKENS</text>
    
    <!-- Color Palette -->
    <text x="0" y="44" fill="#a1a1aa" font-size="11" class="label-mono" font-weight="700">COLOR PALETTE</text>
    
    <g transform="translate(0, 56)">
      <!-- Accent -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="36" height="24" rx="4" fill="#2dd4bf" />
        <text x="46" y="16" fill="#fafafa" font-size="11" font-weight="600">--pui-accent</text>
      </g>
      <!-- Positive -->
      <g transform="translate(150, 0)">
        <rect x="0" y="0" width="36" height="24" rx="4" fill="#4ade80" />
        <text x="46" y="16" fill="#fafafa" font-size="11" font-weight="600">--pui-positive</text>
      </g>
      <!-- Negative -->
      <g transform="translate(300, 0)">
        <rect x="0" y="0" width="36" height="24" rx="4" fill="#f87171" />
        <text x="46" y="16" fill="#fafafa" font-size="11" font-weight="600">--pui-negative</text>
      </g>
    </g>

    <!-- Typography Scale -->
    <text x="0" y="116" fill="#a1a1aa" font-size="11" class="label-mono" font-weight="700">TYPOGRAPHY SCALE</text>
    <g transform="translate(0, 130)" font-size="12" fill="#e4e4e7" font-weight="500">
      <text x="0" y="12"><tspan fill="#71717a" font-family="monospace">xs: 12px</tspan> (0.75rem)  →  Active status, categories</text>
      <text x="0" y="34"><tspan fill="#71717a" font-family="monospace">sm: 14px</tspan> (0.875rem) →  Volume, ends date, small buttons</text>
      <text x="0" y="56"><tspan fill="#71717a" font-family="monospace">base: 16px</tspan> (1.00rem) →  Market titles, main labels</text>
      <text x="0" y="78"><tspan fill="#71717a" font-family="monospace">lg: 18px</tspan> (1.125rem) →  Large headers, odds titles</text>
    </g>

    <!-- Spacing Scale -->
    <text x="0" y="240" fill="#a1a1aa" font-size="11" class="label-mono" font-weight="700">SPACING SCALE</text>
    <g transform="translate(0, 252)">
      <!-- Space 1 -->
      <rect x="0" y="0" width="80" height="20" rx="4" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <text x="40" y="13" fill="#a1a1aa" font-size="9" class="label-mono" text-anchor="middle" font-weight="600">space-1 (4px)</text>

      <!-- Space 2 -->
      <rect x="90" y="0" width="80" height="20" rx="4" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <text x="130" y="13" fill="#a1a1aa" font-size="9" class="label-mono" text-anchor="middle" font-weight="600">space-2 (8px)</text>

      <!-- Space 3 -->
      <rect x="180" y="0" width="85" height="20" rx="4" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <text x="222.5" y="13" fill="#a1a1aa" font-size="9" class="label-mono" text-anchor="middle" font-weight="600">space-3 (12px)</text>

      <!-- Space 4 -->
      <rect x="275" y="0" width="85" height="20" rx="4" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <text x="317.5" y="13" fill="#a1a1aa" font-size="9" class="label-mono" text-anchor="middle" font-weight="600">space-4 (16px)</text>
    </g>
  </g>

  <!-- SECTION 02: CODE SPEC (Bottom Left) -->
  <g transform="translate(60, 440)" class="label-sans">
    <text x="0" y="15" fill="#71717a" font-size="11" class="label-mono" font-weight="700" letter-spacing="0.05em">02. REACT IMPLEMENTATION</text>

    <!-- Code Block Container -->
    <rect x="0" y="30" width="420" height="110" rx="6" fill="#090d16" stroke="#1e293b" stroke-width="1" />
    
    <!-- Code text (VS Code Dark Style) -->
    <g transform="translate(20, 50)" class="code-text" font-size="12">
      <text x="0" y="12">
        <tspan fill="#c084fc">import</tspan> <tspan fill="#f1f5f9">{</tspan> <tspan fill="#facc15">MarketCard</tspan> <tspan fill="#f1f5f9">}</tspan> <tspan fill="#c084fc">from</tspan> <tspan fill="#4ade80">"@polymarket-ui/react"</tspan><tspan fill="#f1f5f9">;</tspan>
      </text>

      <text x="0" y="42">
        <tspan fill="#60a5fa">&lt;</tspan><tspan fill="#facc15">MarketCard</tspan> <tspan fill="#f87171">slug</tspan><tspan fill="#f1f5f9">=</tspan><tspan fill="#4ade80">"btc-ath-2026"</tspan> <tspan fill="#f87171">theme</tspan><tspan fill="#f1f5f9">=</tspan><tspan fill="#4ade80">"dark"</tspan> <tspan fill="#60a5fa">/&gt;</tspan>
      </text>
    </g>
  </g>

  <!-- SECTION 03: COMPONENT VARIANTS (Top Right) -->
  <g transform="translate(570, 120)" class="label-sans">
    <text x="0" y="15" fill="#71717a" font-size="11" class="label-mono" font-weight="700" letter-spacing="0.05em">03. COMPONENT VARIANTS: OUTCOME_BUTTON</text>

    <!-- Default State -->
    <g transform="translate(0, 32)">
      <rect x="0" y="0" width="180" height="38" rx="6" fill="#0f141b" stroke="#28313d" stroke-width="1.5" />
      <text x="12" y="24" fill="#b6c2cf" font-size="13" font-weight="600">Yes</text>
      <text x="168" y="24" fill="#8996a3" font-size="13" font-weight="700" text-anchor="end">68¢</text>
      <text x="0" y="52" fill="#71717a" font-size="9" class="label-mono">[Variant: Default]</text>
    </g>

    <!-- Active State -->
    <g transform="translate(195, 32)">
      <rect x="0" y="0" width="180" height="38" rx="6" fill="#11351f" stroke="#4ade80" stroke-width="1.5" />
      <text x="12" y="24" fill="#4ade80" font-size="13" font-weight="600">Yes</text>
      <text x="168" y="24" fill="#4ade80" font-size="13" font-weight="700" text-anchor="end">68¢</text>
      <text x="0" y="52" fill="#71717a" font-size="9" class="label-mono">[Variant: Active]</text>
    </g>

    <!-- Disabled State -->
    <g transform="translate(390, 32)">
      <rect x="0" y="0" width="180" height="38" rx="6" fill="#0f141b" stroke="#28313d" stroke-opacity="0.3" stroke-width="1" />
      <text x="12" y="24" fill="#8996a3" fill-opacity="0.4" font-size="13" font-weight="600">No</text>
      <text x="168" y="24" fill="#8996a3" fill-opacity="0.4" font-size="13" font-weight="700" text-anchor="end">32¢</text>
      <text x="0" y="52" fill="#71717a" font-size="9" class="label-mono">[Variant: Disabled]</text>
    </g>
  </g>

  <!-- SECTION 04: COMPONENT PREVIEW: MARKET_CARD (Bottom Right) -->
  <g transform="translate(570, 310)" class="label-sans">
    <text x="0" y="15" fill="#71717a" font-size="11" class="label-mono" font-weight="700" letter-spacing="0.05em">04. COMPONENT: MARKET_CARD (DARK THEME)</text>

    <!-- MarketCard Component Frame -->
    <g transform="translate(0, 32)">
      <rect x="0" y="0" width="580" height="195" rx="8" fill="#0f141b" stroke="#28313d" stroke-width="1.5" />

      <!-- Card Header -->
      <g transform="translate(24, 20)">
        <!-- Status Badge -->
        <rect x="0" y="0" width="58" height="18" rx="9" fill="#11351f" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1" />
        <circle cx="8" cy="9" r="3" fill="#4ade80" />
        <text x="18" y="13" fill="#4ade80" font-size="10" font-weight="600">Active</text>
        
        <!-- Category -->
        <text x="70" y="13" fill="#8996a3" font-size="11" class="label-mono" font-weight="600">CAT: CRYPTO</text>
      </g>

      <!-- Builder Badge (indigo) -->
      <g transform="translate(456, 20)">
        <rect x="0" y="0" width="100" height="18" rx="9" fill="#1e1b4b" stroke="#4338ca" stroke-width="1" />
        <text x="50" y="12" fill="#c7d2fe" font-size="9" font-weight="600" text-anchor="middle">by polymarket-ui</text>
      </g>

      <!-- Market Question -->
      <text x="24" y="62" fill="#f4f7fb" font-size="16" font-weight="700">Will Bitcoin set a new All-Time High in 2026?</text>

      <!-- Outcome Buttons -->
      <!-- Yes Button (Active) -->
      <g transform="translate(24, 82)">
        <rect x="0" y="0" width="258" height="38" rx="6" fill="#11351f" stroke="#4ade80" stroke-width="1.5" />
        <text x="12" y="24" fill="#4ade80" font-size="13" font-weight="600">Yes</text>
        <text x="246" y="24" fill="#4ade80" font-size="13" font-weight="700" text-anchor="end">68¢</text>
      </g>
      <!-- No Button (Default) -->
      <g transform="translate(298, 82)">
        <rect x="0" y="0" width="258" height="38" rx="6" fill="#151c25" stroke="#28313d" stroke-width="1" />
        <text x="12" y="24" fill="#b6c2cf" font-size="13" font-weight="600">No</text>
        <text x="246" y="24" fill="#8996a3" font-size="13" font-weight="700" text-anchor="end">32¢</text>
      </g>

      <!-- Sparkline chart built inside the card -->
      <g transform="translate(24, 130)">
        <!-- Trendline Fill -->
        <path d="M 0 25 C 50 20, 100 28, 150 15 C 200 5, 270 20, 350 10 C 400 3, 480 8, 532 5 L 532 30 L 0 30 Z" fill="#11351f" fill-opacity="0.3" />
        <!-- Trendline Stroke -->
        <path d="M 0 25 C 50 20, 100 28, 150 15 C 200 5, 270 20, 350 10 C 400 3, 480 8, 532 5" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>

      <!-- Card Footer -->
      <line x1="24" y1="166" x2="556" y2="166" stroke="#28313d" stroke-width="1" />
      <text x="24" y="181" fill="#8996a3" font-size="10" font-weight="600">Volume: $15.4M</text>
      <text x="556" y="181" fill="#8996a3" font-size="10" font-weight="600" text-anchor="end">Ends Dec 31, 2026</text>
    </g>
  </g>
</svg>
