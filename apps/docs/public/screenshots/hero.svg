<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" fill="none">
  <rect width="1200" height="640" fill="#F4F7FB"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#17304D" flood-opacity=".10"/>
    </filter>
    <linearGradient id="chart" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#1F9E93"/>
      <stop offset="1" stop-color="#5BC8BB"/>
    </linearGradient>
  </defs>
  <style>
    .sans{font-family:"Instrument Sans",Inter,Arial,sans-serif}.serif{font-family:"Source Serif 4",Georgia,serif}.nav{font-size:13px;font-weight:700}.muted{fill:#52657B}.label{font-size:12px;font-weight:700}.title{font-size:58px;font-weight:760;letter-spacing:-2.8px}.question{font-size:34px;font-weight:650;letter-spacing:-.7px}.meta{font-size:11px}.value{font-size:22px;font-weight:800}.proof{font-size:20px;font-weight:800}
  </style>
  <g class="sans">
    <rect x="38" y="24" width="12" height="12" rx="2" fill="#1E63F3"/>
    <text x="64" y="36" fill="#0B1D33" font-size="15" font-weight="800">Polymarket UI Kit</text>
    <g class="nav" fill="#52657B">
      <text x="806" y="36">Components</text><text x="905" y="36">Lab</text><text x="950" y="36">Studio</text><text x="1013" y="36">GitHub</text>
    </g>
    <rect x="1080" y="17" width="82" height="30" rx="15" fill="#FFFFFF" stroke="#D7E1EC"/>
    <text x="1093" y="36" fill="#0B1D33" font-size="11" font-weight="800">light</text><text x="1130" y="36" fill="#74869A" font-size="11">dark</text>
    <path d="M38 64H1162" stroke="#D7E1EC"/>

    <circle cx="44" cy="130" r="4" fill="#1F9E93"/>
    <text x="56" y="134" fill="#1E63F3" class="label">Civic Forecast · politics-first release</text>
    <text x="38" y="205" fill="#0B1D33" class="title">Publish evidence-</text>
    <text x="38" y="263" fill="#0B1D33" class="title">backed market</text>
    <text x="38" y="321" fill="#0B1D33" class="title">interfaces.</text>
    <text x="38" y="362" class="muted" font-size="16">Open-source React primitives, public data tools, and</text>
    <text x="38" y="386" class="muted" font-size="16">distribution surfaces for clear political markets.</text>
    <rect x="38" y="417" width="142" height="46" rx="8" fill="#1E63F3"/>
    <text x="61" y="446" fill="#FFFFFF" font-size="14" font-weight="800">Try Studio</text><text x="153" y="446" fill="#FFFFFF" font-size="18">→</text>
    <text x="201" y="446" fill="#52657B" font-size="13" font-weight="700">View on GitHub ↗</text>

    <g filter="url(#shadow)">
      <rect x="538" y="103" width="624" height="404" rx="18" fill="#FFFFFF" stroke="#D7E1EC"/>
    </g>
    <circle cx="570" cy="133" r="4" fill="#1F9E93"/>
    <text x="582" y="137" class="muted meta">Fallback market fixture</text><text x="1123" y="137" class="muted meta" text-anchor="end">Politics</text>
    <text x="570" y="190" fill="#0B1D33" class="serif question">Who will win the 2028</text>
    <text x="570" y="229" fill="#0B1D33" class="serif question">US presidential election?</text>
    <path d="M570 252H1130" stroke="#D7E1EC"/>
    <text x="570" y="279" class="muted meta">Candidate A</text><text x="570" y="304" fill="#1F9E93" class="value">42%</text>
    <text x="1130" y="279" class="muted meta" text-anchor="end">Resolution</text><text x="1130" y="301" fill="#0B1D33" font-size="13" font-weight="800" text-anchor="end">Nov 8, 2028</text>
    <rect x="570" y="326" width="560" height="135" rx="10" fill="#F8FAFD" stroke="#D7E1EC"/>
    <path d="M570 371H1130M570 416H1130" stroke="#E3EBF5" stroke-dasharray="4 6"/>
    <path d="M570 411C622 410 652 403 701 407C750 411 783 420 829 410C876 399 900 384 949 386C1002 388 1062 377 1130 372" stroke="url(#chart)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="580" cy="482" r="4" fill="#1F9E93"/><text x="592" y="486" fill="#52657B" font-size="11" font-weight="700">Candidate A</text>

    <path d="M38 534H1162" stroke="#D7E1EC"/>
    <text x="38" y="575" fill="#0B1D33" class="proof">21</text><text x="38" y="596" class="muted meta">typed React components</text>
    <path d="M305 550V610" stroke="#D7E1EC"/><text x="334" y="575" fill="#0B1D33" class="proof">public</text><text x="334" y="596" class="muted meta">no-auth data defaults</text>
    <path d="M610 550V610" stroke="#D7E1EC"/><text x="640" y="575" fill="#0B1D33" class="proof">PNG + SVG</text><text x="640" y="596" class="muted meta">share export</text>
    <path d="M915 550V610" stroke="#D7E1EC"/><text x="945" y="575" fill="#0B1D33" class="proof">7</text><text x="945" y="596" class="muted meta">copy-in registry items</text>
  </g>
</svg>
